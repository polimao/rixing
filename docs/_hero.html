<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; box-sizing: border-box; }

    body {
      width: 1280px;
      height: 720px;
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(255, 255, 255, .25), transparent 60%),
        linear-gradient(135deg, #4f46e5 0%, #7c3aed 52%, #9333ea 100%);
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      overflow: hidden;
      position: relative;
    }

    .menubar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 30px;
      background: rgba(0, 0, 0, .22);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      padding: 0 18px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }

    .menubar .chip { background: rgba(255, 255, 255, .16); padding: 3px 9px; border-radius: 7px; }
    .menubar .dim { opacity: .8; font-weight: 500; }

    .title { position: absolute; left: 84px; top: 92px; color: #fff; }
    .title .brand { display: flex; align-items: center; gap: 14px; }
    .title .logo {
      width: 52px; height: 52px; border-radius: 14px;
      background: rgba(255, 255, 255, .16);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; box-shadow: 0 6px 20px rgba(0, 0, 0, .25);
    }
    .title h1 { font-size: 46px; font-weight: 800; letter-spacing: -1.5px; }
    .title p { font-size: 19px; opacity: .92; margin-top: 14px; max-width: 460px; line-height: 1.5; font-weight: 400; }
    .badges { margin-top: 20px; display: flex; gap: 10px; }
    .badge { background: rgba(255, 255, 255, .14); color: #fff; font-size: 13px; font-weight: 600; padding: 6px 12px; border-radius: 20px; }

    img { position: absolute; }
    .todos { width: 366px; left: 76px; top: 286px; }
    .cal { width: 312px; right: 104px; top: 130px; }
    .settings { width: 218px; right: 150px; top: 360px; }
  </style>
</head>

<body>
  <div class="menubar">
    <span class="chip">待办 3</span>
    <span class="chip">6月23日</span>
    <span class="dim">100%</span>
    <span class="dim">11:25</span>
  </div>

  <div class="title">
    <div class="brand">
      <div class="logo">📋</div>
      <h1>待办 · Todos</h1>
    </div>
    <p>A minimalist menu-bar to-do &amp; calendar for macOS. Fast, private, always one click away.</p>
    <div class="badges">
      <span class="badge">⌘⇧U Global hotkey</span>
      <span class="badge">8 languages</span>
      <span class="badge">Light / Dark</span>
    </div>
  </div>

  <div class="stage">
    <img class="cal" src="images/calendar-light.png">
    <img class="todos" src="images/todos-light.png">
    <img class="settings" src="images/settings-dark.png">
  </div>
</body>

</html>
