<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>设置</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      font-size: 13px;
      transition: background .2s, color .2s;
      overflow-y: auto;
    }

    .wrap {
      padding: 16px 18px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: .5px;
      margin: 4px 2px 8px;
    }

    .section-title:not(:first-child) {
      margin-top: 18px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      gap: 12px;
    }

    .row .label {
      font-weight: 500;
      white-space: nowrap;
    }

    select {
      -webkit-appearance: none;
      appearance: none;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 26px 5px 10px;
      font-size: 13px;
      cursor: pointer;
      max-width: 180px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 9px center;
    }

    /* toggle switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border-strong);
      border-radius: 22px;
      transition: background .2s;
      cursor: pointer;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .2);
      transition: transform .2s;
    }

    .switch input:checked+.slider {
      background: var(--accent);
    }

    .switch input:checked+.slider::before {
      transform: translateX(18px);
    }

    input.num {
      width: 64px;
      text-align: right;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 13px;
    }

    .kbd {
      min-width: 76px;
      text-align: center;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
    }

    .kbd.recording {
      border-color: var(--accent);
      color: var(--accent);
    }

    .kbd.warn {
      border-color: #f56c6c;
      color: #f56c6c;
    }

    .mini-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .perm .label {
      color: var(--text-sub);
      font-size: 12px;
      white-space: normal;
    }

    #tidy-detail.disabled {
      opacity: .45;
      pointer-events: none;
    }

    /* 主题：图标分段选择 */
    .seg {
      display: inline-flex;
      gap: 2px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 3px;
    }

    .seg-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 26px;
      border: none;
      background: transparent;
      color: var(--text-sub);
      border-radius: 7px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .seg-btn:hover {
      color: var(--text);
    }

    .seg-btn.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .14);
    }

    .seg-btn svg {
      width: 16px;
      height: 16px;
    }

    /* 语言：国旗单选 */
    .row.col {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }

    .flags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
      justify-content: flex-end;
    }

    .flag-btn {
      width: 38px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      line-height: 1;
      background: var(--surface-2);
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .flag-btn:hover {
      background: var(--surface-3);
    }

    .flag-btn.active {
      border-color: var(--accent);
      background: var(--surface);
    }

    /* 码放快捷键：方向键十字布局 */
    .tidy-cross {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 10px;
      margin-top: 12px;
    }

    .cross-cell {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .cross-cell .kbd {
      width: auto;
      min-width: 50px;
      /* 原 76px，约缩小 1/3 */
      padding: 5px 8px;
    }

    .cross-label {
      font-size: 12px;
      color: var(--text-sub);
      white-space: nowrap;
    }

    .c-max {
      grid-column: 2;
      grid-row: 1;
    }

    .c-left {
      grid-column: 1;
      grid-row: 2;
    }

    .c-right {
      grid-column: 3;
      grid-row: 2;
    }

    .c-restore {
      grid-column: 2;
      grid-row: 3;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="section-title" data-i18n="general">通用</div>
    <div class="row">
      <span class="label" data-i18n="autostart">开机自启动</span>
      <label class="switch">
        <input type="checkbox" id="autostart">
        <span class="slider"></span>
      </label>
    </div>
    <div class="row">
      <span class="label" data-i18n="show_count">显示待办统计</span>
      <label class="switch">
        <input type="checkbox" id="show-count">
        <span class="slider"></span>
      </label>
    </div>

    <div class="section-title" data-i18n="appearance">外观</div>
    <div class="row">
      <span class="label" data-i18n="theme">主题</span>
      <div class="seg" id="theme-seg">
        <button class="seg-btn" data-theme="light" data-i18n-title="theme_light" type="button" title="亮色">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"></circle>
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41">
            </path>
          </svg>
        </button>
        <button class="seg-btn" data-theme="dark" data-i18n-title="theme_dark" type="button" title="暗色">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button class="seg-btn" data-theme="system" data-i18n-title="theme_system" type="button" title="随系统">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"></rect>
            <path d="M8 21h8M12 17v4"></path>
          </svg>
        </button>
      </div>
    </div>
    <div class="row">
      <span class="label" data-i18n="language">语言</span>
      <div class="flags" id="language-flags"></div>
    </div>

    <div class="section-title" data-i18n="tidy">码放</div>
    <div class="row">
      <span class="label" data-i18n="tidy_enable">启用窗口整理</span>
      <label class="switch">
        <input type="checkbox" id="tidy-enabled">
        <span class="slider"></span>
      </label>
    </div>
    <div id="tidy-detail">
      <div class="row perm" id="tidy-perm-row" style="display:none">
        <span class="label" data-i18n="tidy_perm">需开启「辅助功能」权限</span>
        <button class="mini-btn" id="tidy-grant" data-i18n="tidy_grant">去授权</button>
      </div>
      <div class="row">
        <span class="label" data-i18n="tidy_gap">窗口边距 (px)</span>
        <input type="number" id="tidy-gap" class="num" min="0" max="80" step="1">
      </div>
      <!-- 快捷键按方向键十字摆放：上=最大化 / 左=左半屏 / 右=右半屏 / 下=复原 -->
      <div class="tidy-cross">
        <div class="cross-cell c-max">
          <span class="cross-label" data-i18n="tidy_max">最大化</span>
          <button class="kbd" data-key="max"></button>
        </div>
        <div class="cross-cell c-left">
          <span class="cross-label" data-i18n="tidy_left">左半屏</span>
          <button class="kbd" data-key="left"></button>
        </div>
        <div class="cross-cell c-right">
          <span class="cross-label" data-i18n="tidy_right">右半屏</span>
          <button class="kbd" data-key="right"></button>
        </div>
        <div class="cross-cell c-restore">
          <span class="cross-label" data-i18n="tidy_restore">复原</span>
          <button class="kbd" data-key="restore"></button>
        </div>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="ui-common.js"></script>
  <script src="settings.js"></script>
</body>

</html>
