<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>设置</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      font-size: 13px;
      transition: background .2s, color .2s;
      overflow-y: auto;
    }

    .wrap {
      padding: 16px 18px;
    }

    /* 顶部标签分页 */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;
    }

    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 7px 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-sub);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      transition: background .15s, color .15s, border-color .15s;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--surface);
    }

    .tab svg {
      width: 14px;
      height: 14px;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* 标签页内首个分组标题与标签栏间距收紧 */
    .tab-panel .section-title:first-child {
      margin-top: 0;
    }

    /* 简明教程：通用页顶部的轻量提示卡 */
    .guide-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 12px;
      margin-bottom: 8px;
    }

    .guide-line {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 0;
    }

    .guide-line:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    .guide-line svg {
      flex-shrink: 0;
      width: 15px;
      height: 15px;
      color: var(--accent);
    }

    .guide-line b {
      font-weight: 600;
    }

    .guide-line .sep {
      color: var(--text-sub);
      margin: 0 6px;
    }

    .guide-line span span {
      color: var(--text-sub);
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: .5px;
      margin: 4px 2px 8px;
    }

    .section-title:not(:first-child) {
      margin-top: 18px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      gap: 12px;
    }

    .row .label {
      font-weight: 500;
      white-space: nowrap;
    }

    select {
      -webkit-appearance: none;
      appearance: none;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 26px 5px 10px;
      font-size: 13px;
      cursor: pointer;
      max-width: 180px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 9px center;
    }

    /* toggle switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border-strong);
      border-radius: 22px;
      transition: background .2s;
      cursor: pointer;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .2);
      transition: transform .2s;
    }

    .switch input:checked+.slider {
      background: var(--accent);
    }

    .switch input:checked+.slider::before {
      transform: translateX(18px);
    }

    input.num {
      width: 64px;
      text-align: right;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 13px;
    }

    .kbd {
      min-width: 76px;
      text-align: center;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
    }

    .kbd.recording {
      border-color: var(--accent);
      color: var(--accent);
    }

    .kbd.warn {
      border-color: #f56c6c;
      color: #f56c6c;
    }

    .mini-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .perm .label {
      color: var(--text-sub);
      font-size: 12px;
      white-space: normal;
    }

    #tidy-detail.disabled {
      opacity: .45;
      pointer-events: none;
    }

    /* 主题：图标分段选择 */
    .seg {
      display: inline-flex;
      gap: 2px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 3px;
    }

    .seg-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 26px;
      border: none;
      background: transparent;
      color: var(--text-sub);
      border-radius: 7px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .seg-btn:hover {
      color: var(--text);
    }

    .seg-btn.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .14);
    }

    .seg-btn svg {
      width: 16px;
      height: 16px;
    }

    /* 语言：国旗单选 */
    .row.col {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }

    .flags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
      justify-content: flex-end;
    }

    .flag-btn {
      width: 38px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      line-height: 1;
      background: var(--surface-2);
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .flag-btn:hover {
      background: var(--surface-3);
    }

    .flag-btn.active {
      border-color: var(--accent);
      background: var(--surface);
    }

    /* 码放快捷键：方向键十字布局 */
    .tidy-cross {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 10px;
      margin-top: 12px;
    }

    .cross-cell {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .cross-cell .kbd {
      width: auto;
      min-width: 50px;
      /* 原 76px，约缩小 1/3 */
      padding: 5px 8px;
    }

    .cross-label {
      font-size: 12px;
      color: var(--text-sub);
      white-space: nowrap;
    }

    .c-max {
      grid-column: 2;
      grid-row: 1;
    }

    .c-left {
      grid-column: 1;
      grid-row: 2;
    }

    .c-right {
      grid-column: 3;
      grid-row: 2;
    }

    .c-restore {
      grid-column: 2;
      grid-row: 3;
    }

    /* 念日 */
    .ann-input {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
    }

    .ann-input:focus {
      border-color: var(--accent);
    }

    input[type="date"].ann-input {
      color-scheme: light dark;
    }

    /* 念日：单行式（展示 / 编辑 / 新增 同构：标题 · 日期 · 重复 · 操作） */
    .ann-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .ann-name-cell {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
    }

    .ann-date-cell {
      flex-shrink: 0;
      color: var(--text-sub);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .ann-date-input {
      flex-shrink: 0;
      width: 130px;
    }

    /* 重复设置：可点切换的小药丸（展示行用 .static 只读外观） */
    .ann-rep {
      flex-shrink: 0;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid var(--border-strong);
      background: transparent;
      color: var(--text-sub);
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, color .15s, border-color .15s;
    }

    .ann-rep.on {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .ann-rep.static {
      cursor: default;
    }

    /* 操作按钮：编辑 / 删除 / 取消（图标小按钮） */
    .ann-iconbtn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text-sub);
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }

    .ann-iconbtn:hover {
      color: var(--text);
      background: var(--surface-3);
    }

    .ann-iconbtn.danger:hover {
      color: #f56c6c;
      border-color: #fde0e0;
      background: #fff0f0;
    }

    .ann-iconbtn svg {
      width: 15px;
      height: 15px;
    }

    @keyframes ann-shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-4px); }
      40%       { transform: translateX(4px); }
      60%       { transform: translateX(-3px); }
      80%       { transform: translateX(3px); }
    }

    .ann-shake {
      animation: ann-shake 0.35s ease;
      border-color: #f56c6c !important;
    }

    /* 关于 */
    .about-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 22px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .about-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .2px;
    }

    .about-version {
      font-size: 12px;
      color: var(--text-sub);
    }

    .about-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .about-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="tabs" id="tabs">
      <button class="tab active" type="button" data-tab="general">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span data-i18n="general">通用</span>
      </button>
      <button class="tab" type="button" data-tab="ann">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M20 10c0 6-8 11-8 11s-8-5-8-11a8 8 0 0 1 16 0z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
        <span data-i18n="ann_section">念日</span>
      </button>
      <button class="tab" type="button" data-tab="tidy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="18" rx="1"></rect>
          <rect x="14" y="3" width="7" height="8" rx="1"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1"></rect>
        </svg>
        <span data-i18n="tidy">窗口分屏</span>
      </button>
      <button class="tab" type="button" data-tab="about">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 16v-4M12 8h.01"></path>
        </svg>
        <span data-i18n="about">关于</span>
      </button>
    </div>

    <div class="tab-panel active" data-panel="general">
    <div class="section-title" data-i18n="guide">简明教程</div>
    <div class="guide-card">
      <div class="guide-line">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="6" rx="1"></rect>
          <circle cx="8" cy="7" r="0.5"></circle><circle cx="11" cy="7" r="0.5"></circle>
        </svg>
        <span><b data-i18n="welcome_two_t">菜单栏新增两个图标</b><span class="sep">—</span><span data-i18n="welcome_two_d">待办清单 与 日历</span></span>
      </div>
      <div class="guide-line">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 3h14a2 2 0 0 1 2 2v3H3V5a2 2 0 0 1 2-2zM3 8h18M9 3v5"></path>
        </svg>
        <span><b data-i18n="welcome_left_t">左键点击</b><span class="sep">—</span><span data-i18n="welcome_left_d">打开或收起窗口</span></span>
      </div>
      <div class="guide-line">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 3h14a2 2 0 0 1 2 2v3H3V5a2 2 0 0 1 2-2zM3 8h18M15 3v5"></path>
        </svg>
        <span><b data-i18n="welcome_right_t">右键点击</b><span class="sep">—</span><span data-i18n="welcome_right_d">念日 · 窗口分屏 · 通用设置 · 关于</span></span>
      </div>
    </div>

    <div class="section-title" data-i18n="general">通用</div>
    <div class="row">
      <span class="label" data-i18n="autostart">开机自启动</span>
      <label class="switch">
        <input type="checkbox" id="autostart">
        <span class="slider"></span>
      </label>
    </div>
    <div class="row">
      <span class="label" data-i18n="show_count">显示待办统计</span>
      <label class="switch">
        <input type="checkbox" id="show-count">
        <span class="slider"></span>
      </label>
    </div>

    <div class="section-title" data-i18n="appearance">外观</div>
    <div class="row">
      <span class="label" data-i18n="theme">主题</span>
      <div class="seg" id="theme-seg">
        <button class="seg-btn" data-theme="light" data-i18n-title="theme_light" type="button" title="亮色">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"></circle>
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41">
            </path>
          </svg>
        </button>
        <button class="seg-btn" data-theme="dark" data-i18n-title="theme_dark" type="button" title="暗色">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button class="seg-btn" data-theme="system" data-i18n-title="theme_system" type="button" title="随系统">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"></rect>
            <path d="M8 21h8M12 17v4"></path>
          </svg>
        </button>
      </div>
    </div>
    <div class="row">
      <span class="label" data-i18n="language">语言</span>
      <div class="flags" id="language-flags"></div>
    </div>
    </div>

    <div class="tab-panel" data-panel="ann">
    <div id="ann-list"></div>
    <div class="ann-row">
      <input id="ann-name" type="text" class="ann-input ann-name-cell"
             data-i18n-placeholder="ann_name_placeholder" placeholder="如：妈妈生日">
      <input id="ann-date" type="date" class="ann-input ann-date-input">
      <button type="button" id="ann-repeat" class="ann-rep on"
              data-i18n-title="ann_repeat" title="每年重复">每年</button>
      <button class="mini-btn" id="ann-add-btn" data-i18n="ann_add">+ 添加</button>
    </div>
    </div>

    <div class="tab-panel" data-panel="tidy">
    <div class="row">
      <span class="label" data-i18n="tidy_enable">启用窗口整理</span>
      <label class="switch">
        <input type="checkbox" id="tidy-enabled">
        <span class="slider"></span>
      </label>
    </div>
    <div id="tidy-detail">
      <div class="row perm" id="tidy-perm-row" style="display:none">
        <span class="label" data-i18n="tidy_perm">需开启「辅助功能」权限</span>
        <button class="mini-btn" id="tidy-grant" data-i18n="tidy_grant">去授权</button>
      </div>
      <div class="row">
        <span class="label" data-i18n="tidy_gap">窗口边距 (px)</span>
        <input type="number" id="tidy-gap" class="num" min="0" max="80" step="1">
      </div>
      <!-- 快捷键按方向键十字摆放：上=最大化 / 左=左半屏 / 右=右半屏 / 下=复原 -->
      <div class="tidy-cross">
        <div class="cross-cell c-max">
          <span class="cross-label" data-i18n="tidy_max">最大化</span>
          <button class="kbd" data-key="max"></button>
        </div>
        <div class="cross-cell c-left">
          <span class="cross-label" data-i18n="tidy_left">左半屏</span>
          <button class="kbd" data-key="left"></button>
        </div>
        <div class="cross-cell c-right">
          <span class="cross-label" data-i18n="tidy_right">右半屏</span>
          <button class="kbd" data-key="right"></button>
        </div>
        <div class="cross-cell c-restore">
          <span class="cross-label" data-i18n="tidy_restore">复原</span>
          <button class="kbd" data-key="restore"></button>
        </div>
      </div>
    </div>
    </div>

    <div class="tab-panel" data-panel="about">
      <div class="about-row">
        <span class="about-name">日行 · RiXing</span>
        <span class="about-version" id="about-version">v1.0.0</span>
        <button class="about-link" id="about-github" data-i18n="about_github">GitHub 主页</button>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="ui-common.js"></script>
  <script src="settings.js"></script>
</body>

</html>
