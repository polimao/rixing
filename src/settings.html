<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>设置</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      font-size: 13px;
      transition: background .2s, color .2s;
      overflow-y: auto;
    }

    .wrap {
      padding: 16px 18px;
    }

    /* 顶部标签分页 */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;
    }

    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 7px 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-sub);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      transition: background .15s, color .15s, border-color .15s;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      background: var(--active-tab, #2962d9);
      border-color: var(--active-tab, #2962d9);
      color: #fff;
    }

    .tab svg {
      width: 14px;
      height: 14px;
    }

    .tab .icon-line {
      display: none;
    }

    .tab .icon-filled {
      display: block;
      padding: 2px;
      border-radius: 5px;
      width: 22px;
      height: 22px;
    }

    .tab[data-tab="general"] .icon-filled {
      color: #fff;
      background: var(--tab-general);
    }

    .tab[data-tab="ann"] .icon-filled {
      color: #fff;
      background: var(--tab-ann);
    }

    .tab[data-tab="tidy"] .icon-filled {
      color: #fff;
      background: var(--tab-tidy);
    }

    .tab[data-tab="about"] .icon-filled {
      color: #fff;
      background: var(--tab-about);
    }

    .tab[data-tab="translate"] .icon-filled {
      color: #fff;
      background: var(--tab-translate);
    }

    .tab[data-tab="focus"] .icon-filled {
      color: #fff;
      background: var(--tab-focus);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* 标签页内首个分组标题与标签栏间距收紧 */
    .tab-panel .section-title:first-child {
      margin-top: 0;
    }

    /* 简明教程：通用页顶部的轻量提示块（一个整体，无内部分割线） */
    .guide-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 14px;
      margin-bottom: 8px;
    }

    .guide-line {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-sub);
    }

    .guide-line svg {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      color: var(--accent);
    }

    .guide-line b {
      font-weight: 400;
    }

    .guide-line .sep {
      margin: 0 6px;
      opacity: .5;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: .5px;
      margin: 4px 2px 8px;
    }

    .section-title:not(:first-child) {
      margin-top: 18px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      gap: 12px;
    }

    .row .label {
      font-weight: 500;
      white-space: nowrap;
    }

    select {
      -webkit-appearance: none;
      appearance: none;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 26px 5px 10px;
      font-size: 13px;
      cursor: pointer;
      max-width: 180px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 9px center;
    }

    /* toggle switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border-strong);
      border-radius: 22px;
      transition: background .2s;
      cursor: pointer;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .2);
      transition: transform .2s;
    }

    .switch input:checked+.slider {
      background: var(--accent);
    }

    .switch input:checked+.slider::before {
      transform: translateX(18px);
    }

    input.num {
      width: 64px;
      text-align: right;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 13px;
    }

    .kbd {
      min-width: 76px;
      text-align: center;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
    }

    .kbd.recording {
      border-color: var(--accent);
      color: var(--accent);
    }

    .kbd.warn {
      border-color: #f56c6c;
      color: #f56c6c;
    }

    .mini-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .perm .label {
      color: var(--text-sub);
      font-size: 12px;
      white-space: normal;
    }

    #tidy-detail.disabled {
      opacity: .45;
      pointer-events: none;
    }

    /* 主题：图标分段选择 */
    .seg {
      display: inline-flex;
      gap: 2px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 3px;
    }

    .seg-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 26px;
      border: none;
      background: transparent;
      color: var(--text-sub);
      border-radius: 7px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .seg-btn:hover {
      color: var(--text);
    }

    .seg-btn.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .14);
    }

    .seg-btn svg {
      width: 16px;
      height: 16px;
    }

    /* 分组卡片：同一分区的若干设置合成一张卡，行间用细分隔线 */
    .group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .grow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
    }

    .grow+.grow {
      border-top: 1px solid var(--border);
    }

    .grow.col {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }

    .grow .label {
      font-weight: 500;
      white-space: nowrap;
    }

    /* 语言下拉选择 */
    #language-select {
      padding: 5px 8px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border-strong);
      background: var(--surface-2);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      outline: none;
      appearance: auto;
    }

    #language-select:focus {
      border-color: var(--accent);
    }

    /* 码放快捷键：方向键十字布局 */
    .tidy-cross {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 10px;
      margin-top: 12px;
    }

    .cross-cell {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .cross-cell .kbd {
      width: auto;
      min-width: 50px;
      /* 原 76px，约缩小 1/3 */
      padding: 5px 8px;
    }

    .cross-label {
      font-size: 12px;
      color: var(--text-sub);
      white-space: nowrap;
    }

    .c-max {
      grid-column: 2;
      grid-row: 1;
    }

    .c-left {
      grid-column: 1;
      grid-row: 2;
    }

    .c-right {
      grid-column: 3;
      grid-row: 2;
    }

    .c-restore {
      grid-column: 2;
      grid-row: 3;
    }

    /* 重要日期倒计时 */
    .ann-input {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
    }

    .ann-input:focus {
      border-color: var(--accent);
    }

    .ann-del-btn:hover {
      background: #fde0e0 !important;
    }

    input[type="date"].ann-input {
      color-scheme: light dark;
    }

    @keyframes ann-shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-4px);
      }

      40% {
        transform: translateX(4px);
      }

      60% {
        transform: translateX(-3px);
      }

      80% {
        transform: translateX(3px);
      }
    }

    .ann-shake {
      animation: ann-shake 0.35s ease;
      border-color: #f56c6c !important;
    }

    /* 关于 */
    .about-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 22px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .about-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .2px;
    }

    .about-version {
      font-size: 12px;
      color: var(--text-sub);
    }

    .about-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .about-link:hover {
      text-decoration: underline;
    }

    /* ============================================================
       翻译面板样式
       ============================================================ */
    .tr-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .lang-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .lang-row select {
      padding: 3px 6px;
      border-radius: 6px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }

    .lang-arrow {
      color: var(--text-sub);
      font-weight: 600;
    }

    .tgt-lang-label {
      font-weight: 600;
      color: var(--accent);
    }

    textarea.tr-source,
    textarea.tr-result {
      -webkit-user-select: text;
      user-select: text;
      flex: 1;
      min-height: 100px;
      resize: none;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      line-height: 1.55;
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      transition: border-color .15s;
    }

    textarea.tr-source:focus,
    textarea.tr-result:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea.tr-result {
      background: var(--surface);
      cursor: text;
    }

    textarea:disabled {
      opacity: 0.7;
    }

    .tr-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background .12s, border-color .12s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--surface-2);
    }

    .btn:active {
      background: var(--surface-3);
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .btn.primary:hover {
      filter: brightness(1.08);
    }

    .btn.primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn:disabled {
      cursor: not-allowed;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--surface-2);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width .3s;
    }

    .progress-fill.animated {
      width: 30% !important;
      animation: loading-pulse 1.4s ease-in-out infinite;
    }

    @keyframes loading-pulse {
      0% {
        margin-left: 0%;
        width: 20%;
      }

      50% {
        margin-left: 50%;
        width: 30%;
      }

      100% {
        margin-left: 80%;
        width: 20%;
      }
    }

    .progress-text {
      font-size: 11px;
      color: var(--text-sub);
      text-align: center;
    }

    .tr-status-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-sub);
    }

    .hidden {
      display: none !important;
    }

    .loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .model-status-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .model-status-tag.downloaded {
      background: rgba(52, 199, 89, 0.12);
      color: #34c759;
    }

    .model-status-tag.loaded {
      background: rgba(41, 98, 217, 0.12);
      color: #2962d9;
    }

    .model-status-tag.none {
      background: var(--surface-2);
      color: var(--text-sub);
    }

    .char-limit {
      font-size: 11px;
      color: var(--text-sub);
    }

    .char-limit.warn {
      color: #ff9500;
    }

    /* ============================================================
       轻听面板样式
       ============================================================ */
    .fm-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .fm-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fm-header-icon {
      font-size: 18px;
      line-height: 1;
    }

    .fm-header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .fm-header-sub {
      font-size: 11px;
      color: var(--text-sub);
    }

    .fm-transport {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .play-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: transform .12s, filter .12s;
      flex-shrink: 0;
    }

    .play-btn:hover {
      filter: brightness(1.1);
    }

    .play-btn:active {
      transform: scale(0.95);
    }

    .play-btn.playing {
      background: var(--text-sub);
    }

    .now-playing {
      font-size: 12px;
      color: var(--text-sub);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }

    .now-playing strong {
      color: var(--text);
    }

    .fm-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: -4px;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .preset-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      transition: background .12s, border-color .12s, box-shadow .12s;
    }

    .preset-card:hover {
      background: var(--surface-2);
      border-color: var(--border-strong);
    }

    .preset-card.active {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, var(--surface));
      box-shadow: 0 0 0 1px var(--accent);
    }

    .preset-card .preset-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .preset-card .preset-desc {
      font-size: 10px;
      color: var(--text-sub);
      line-height: 1.35;
    }

    .prompt-row {
      display: flex;
      gap: 6px;
    }

    .prompt-input {
      flex: 1;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      -webkit-user-select: text;
      user-select: text;
    }

    .prompt-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .prompt-input::placeholder {
      color: var(--text-sub);
    }

    .fm-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: var(--text-sub);
    }

    .toggle-row input {
      display: none;
    }

    .toggle-track {
      width: 32px;
      height: 18px;
      border-radius: 9px;
      background: var(--border-strong);
      position: relative;
      transition: background .15s;
    }

    .toggle-track.on {
      background: var(--accent);
    }

    .toggle-knob {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: left .15s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
    }

    .toggle-track.on .toggle-knob {
      left: 16px;
    }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .volume-icon {
      font-size: 14px;
      color: var(--text-sub);
      flex-shrink: 0;
    }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--border-strong);
      outline: none;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .fm-status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-sub);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border-strong);
      flex-shrink: 0;
    }

    .status-dot.ready {
      background: #34c759;
    }

    .status-dot.playing {
      background: var(--accent);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-dot.error {
      background: #ff3b30;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .setup-banner {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      font-size: 12px;
    }

    .setup-banner p {
      margin: 0 0 10px;
      color: var(--text-sub);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="tabs" id="tabs">
      <button class="tab active" type="button" data-tab="general">
        <svg class="icon-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42">
          </path>
        </svg>
        <svg class="icon-filled" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"></path>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
          </path>
        </svg>
        <span data-i18n="general">通用</span>
      </button>

      <button class="tab" type="button" data-tab="translate">
        <svg class="icon-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 8l5-5 5 5"></path>
          <path d="M5 16l5 5 5-5"></path>
          <line x1="10" y1="3" x2="10" y2="21"></line>
          <line x1="5" y1="8" x2="15" y2="8"></line>
          <line x1="5" y1="16" x2="15" y2="16"></line>
        </svg>
        <svg class="icon-filled" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
        </svg>
        <span data-i18n="tab_translate">翻译</span>
      </button>
      <button class="tab" type="button" data-tab="focus">
        <svg class="icon-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"></path>
          <circle cx="6" cy="18" r="3"></circle>
          <circle cx="18" cy="16" r="3"></circle>
        </svg>
        <svg class="icon-filled" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"></path>
        </svg>
        <span data-i18n="tab_focus">轻听</span>
      </button>

      <button class="tab" type="button" data-tab="ann">
        <svg class="icon-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 10c0 6-8 11-8 11s-8-5-8-11a8 8 0 0 1 16 0z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
        <svg class="icon-filled" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path
            d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 12c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z">
          </path>
        </svg>
        <span data-i18n="ann_section">倒计时</span>
      </button>
      <button class="tab" type="button" data-tab="tidy">
        <svg class="icon-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="18" rx="1"></rect>
          <rect x="14" y="3" width="7" height="8" rx="1"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1"></rect>
        </svg>
        <svg class="icon-filled" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <rect x="3" y="3" width="7" height="18" rx="1"></rect>
          <rect x="14" y="3" width="7" height="8" rx="1"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1"></rect>
        </svg>
        <span data-i18n="tidy">窗口分屏</span>
      </button>
      <button class="tab" type="button" data-tab="about">
        <svg class="icon-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 16v-4M12 8h.01"></path>
        </svg>
        <svg class="icon-filled" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 5h2v2h-2V7zm0 4h2v6h-2v-6z">
          </path>
        </svg>
        <span data-i18n="about">关于</span>
      </button>
    </div>

    <div class="tab-panel active" data-panel="general">
      <div class="section-title" data-i18n="guide">操作指南</div>
      <div class="guide-card">
        <div class="guide-line">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="6" y="2" width="12" height="20" rx="6"></rect>
            <path d="M12 2v9"></path>
            <path d="M12 2.2A5.8 5.8 0 0 0 6.2 8V11H12Z" fill="currentColor" stroke="none"></path>
          </svg>
          <span><b data-i18n="welcome_left_t">左键点击</b> <span data-i18n="welcome_todo_tray">「待办」托盘图标</span><span
              class="sep">→</span><span data-i18n="welcome_todo_d">弹出待办列表</span></span>
        </div>
        <div class="guide-line">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="6" y="2" width="12" height="20" rx="6"></rect>
            <path d="M12 2v9"></path>
            <path d="M12 2.2A5.8 5.8 0 0 0 6.2 8V11H12Z" fill="currentColor" stroke="none"></path>
          </svg>
          <span><b data-i18n="welcome_left_t">左键点击</b> <span data-i18n="welcome_cal_tray">「日期」托盘图标</span><span
              class="sep">→</span><span data-i18n="welcome_cal_d">弹出农历日历</span></span>
        </div>
        <div class="guide-line">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="6" y="2" width="12" height="20" rx="6"></rect>
            <path d="M12 2v9"></path>
            <path d="M12 2.2A5.8 5.8 0 0 1 17.8 8V11H12Z" fill="currentColor" stroke="none"></path>
          </svg>
          <span><b data-i18n="welcome_right_t">右键点击</b> <span data-i18n="welcome_right_d">任意托盘图标</span><span
              class="sep">→</span><span data-i18n="welcome_right_menu">设置 / 其他功能 / 退出</span></span>
        </div>
      </div>

      <div class="section-title" data-i18n="general">通用</div>
      <div class="group">
        <div class="grow">
          <span class="label" data-i18n="autostart">开机自启动</span>
          <label class="switch">
            <input type="checkbox" id="autostart">
            <span class="slider"></span>
          </label>
        </div>
        <div class="grow">
          <span class="label" data-i18n="show_count">显示待办统计</span>
          <label class="switch">
            <input type="checkbox" id="show-count">
            <span class="slider"></span>
          </label>
        </div>
      </div>


      <div class="section-title" data-i18n="hotkey_section">快捷键</div>
      <div class="group">
        <div class="grow">
          <span class="label" data-i18n="todo_hotkey">待办窗口快捷键</span>
          <button class="kbd" data-key="todo"></button>
        </div>
      </div>

      <div class="section-title" data-i18n="appearance">外观</div>
      <div class="group">
        <div class="grow">
          <span class="label" data-i18n="theme">主题</span>
          <div class="seg" id="theme-seg">
            <button class="seg-btn" data-theme="light" data-i18n-title="theme_light" type="button" title="亮色">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"></circle>
                <path
                  d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41">
                </path>
              </svg>
            </button>
            <button class="seg-btn" data-theme="dark" data-i18n-title="theme_dark" type="button" title="暗色">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
              </svg>
            </button>
            <button class="seg-btn" data-theme="system" data-i18n-title="theme_system" type="button" title="随系统">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2"></rect>
                <path d="M8 21h8M12 17v4"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="grow">
          <span class="label" data-i18n="language">语言</span>
          <select id="language-select"></select>
        </div>
      </div>
    </div>

    <div class="tab-panel" data-panel="ann">
      <div id="ann-list"></div>
      <div class="row" style="flex-direction:column;align-items:stretch;gap:8px">
        <div style="display:flex;gap:6px;align-items:center">
          <input id="ann-name" type="text" class="ann-input" style="flex:1;min-width:0"
            data-i18n-placeholder="ann_name_placeholder" placeholder="如：妈妈生日">
          <input id="ann-date" type="date" class="ann-input" style="flex-shrink:0">
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="label" style="font-size:12px" data-i18n="ann_repeat">每年重复</span>
            <label class="switch">
              <input type="checkbox" id="ann-repeat" checked>
              <span class="slider"></span>
            </label>
          </div>
          <button class="mini-btn" id="ann-add-btn" data-i18n="ann_add">+ 添加</button>
        </div>
      </div>
    </div>

    <div class="tab-panel" data-panel="tidy">
      <div class="row">
        <span class="label" data-i18n="tidy_enable">启用窗口整理</span>
        <label class="switch">
          <input type="checkbox" id="tidy-enabled">
          <span class="slider"></span>
        </label>
      </div>
      <div id="tidy-detail">
        <div class="row perm" id="tidy-perm-row" style="display:none">
          <span class="label" data-i18n="tidy_perm">需开启「辅助功能」权限</span>
          <button class="mini-btn" id="tidy-grant" data-i18n="tidy_grant">去授权</button>
        </div>
        <div class="row">
          <span class="label" data-i18n="tidy_gap">窗口边距 (px)</span>
          <input type="number" id="tidy-gap" class="num" min="0" max="80" step="1">
        </div>
        <!-- 快捷键按方向键十字摆放：上=最大化 / 左=左半屏 / 右=右半屏 / 下=复原 -->
        <div class="tidy-cross">
          <div class="cross-cell c-max">
            <span class="cross-label" data-i18n="tidy_max">最大化</span>
            <button class="kbd" data-key="max"></button>
          </div>
          <div class="cross-cell c-left">
            <span class="cross-label" data-i18n="tidy_left">左半屏</span>
            <button class="kbd" data-key="left"></button>
          </div>
          <div class="cross-cell c-right">
            <span class="cross-label" data-i18n="tidy_right">右半屏</span>
            <button class="kbd" data-key="right"></button>
          </div>
          <div class="cross-cell c-restore">
            <span class="cross-label" data-i18n="tidy_restore">复原</span>
            <button class="kbd" data-key="restore"></button>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-panel" data-panel="about">
      <div class="about-row">
        <span class="about-name">日行 · RiXing</span>
        <span class="about-version" id="about-version">v1.0.0</span>
        <button class="about-link" id="about-github" data-i18n="about_github">GitHub 主页</button>
      </div>
    </div>

    <div class="tab-panel" data-panel="translate">
      <div class="tr-wrap">
        <div class="lang-row">
          <span data-i18n="translate_src">源语言</span>
          <select id="src-lang">
            <option value="auto" data-i18n="translate_auto">自动检测</option>
            <option value="Chinese">中文</option>
            <option value="English">English</option>
            <option value="Japanese">日本語</option>
            <option value="Korean">한국어</option>
            <option value="Spanish">Español</option>
            <option value="French">Français</option>
            <option value="German">Deutsch</option>
            <option value="Russian">Русский</option>
          </select>
          <span class="lang-arrow">→</span>
          <span class="tgt-lang-label" id="tgt-lang-label">English</span>
        </div>

        <textarea class="tr-source" id="source-text" data-i18n-placeholder="translate_placeholder"
          placeholder="输入或粘贴需要翻译的文字..."></textarea>

        <div class="tr-actions">
          <button class="btn primary" id="translate-btn" data-i18n="translate_btn">翻译</button>
          <div id="loading-indicator" class="loading-spinner hidden"></div>
          <div style="flex:1"></div>
          <button class="btn" id="model-btn" data-i18n="translate_load_model">加载模型</button>
          <button class="btn" id="download-btn" data-i18n="translate_download_model" style="display:none;">下载模型</button>
        </div>

        <div id="progress-section" class="hidden">
          <div class="progress-bar">
            <div class="progress-fill animated" id="progress-fill" style="width:0%"></div>
          </div>
          <div class="progress-text" id="progress-text">0%</div>
        </div>

        <textarea class="tr-result" id="result-text" readonly data-i18n-placeholder="translate_result_placeholder"
          placeholder="翻译结果将显示在这里..."></textarea>

        <div class="tr-actions">
          <button class="btn" id="copy-btn" data-i18n="translate_copy" disabled>复制结果</button>
        </div>

        <div class="tr-status-row">
          <span id="model-status" data-i18n="translate_no_model">
            <span class="model-status-tag none">模型未加载</span>
          </span>
          <span class="char-limit" id="char-count">0 / 3500</span>
        </div>
      </div>
    </div>

    <div class="tab-panel" data-panel="focus">
      <div class="fm-wrap">
        <div class="fm-header">
          <span class="fm-header-icon">🎵</span>
          <span class="fm-header-title" data-i18n="focus_title">轻听</span>
          <span class="fm-header-sub" data-i18n="focus_subtitle">AI 实时生成</span>
          <span style="flex:1"></span>
        </div>

        <div class="fm-transport">
          <button class="play-btn" id="play-btn" title="播放 / 暂停">▶</button>
          <span class="now-playing" id="now-playing">
            <span data-i18n="focus_ready">就绪</span>
          </span>
        </div>

        <div class="setup-banner" id="setup-banner">
          <p data-i18n="focus_setup_desc">需要 Python 环境和 MRT2 模型才能使用。首次使用请先安装依赖。</p>
          <button class="btn primary" id="setup-btn" data-i18n="focus_check_setup">检查并启动</button>
          <button class="btn" id="open-docs-btn" style="margin-left:6px;" data-i18n="focus_setup_guide">安装指南</button>
        </div>

        <div id="main-ui" class="hidden" style="display:flex;flex-direction:column;gap:12px;">
          <span class="fm-section-label" data-i18n="focus_vibe">场景氛围</span>
          <div class="preset-grid" id="preset-vibe"></div>

          <span class="fm-section-label" data-i18n="focus_genre">音乐风格</span>
          <div class="preset-grid" id="preset-genre"></div>

          <span class="fm-section-label" data-i18n="focus_instrument">乐器主导</span>
          <div class="preset-grid" id="preset-instrument"></div>

          <span class="fm-section-label" data-i18n="focus_custom">自定义提示词</span>
          <div class="prompt-row">
            <input class="prompt-input" id="custom-prompt" data-i18n-placeholder="focus_custom_placeholder"
              placeholder="描述你想要的音乐...">
            <button class="btn primary" id="apply-prompt-btn" data-i18n="focus_apply">应用</button>
          </div>

          <div class="fm-controls">
            <label class="toggle-row" id="drums-toggle">
              <input type="checkbox" id="drums-check" checked>
              <span class="toggle-track on" id="drums-track">
                <span class="toggle-knob"></span>
              </span>
              <span data-i18n="focus_drums">鼓点 / 节奏</span>
            </label>
            <span style="flex:1"></span>
          </div>

          <div class="volume-row">
            <span class="volume-icon">🔊</span>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="80">
          </div>
        </div>

        <div class="fm-status-row" id="fm-status-row">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text" data-i18n="focus_status_init">未启动</span>
        </div>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="ui-common.js"></script>
  <script src="settings.js"></script>
</body>

</html>
