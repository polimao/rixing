<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>设置</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      font-size: 13px;
      transition: background .2s, color .2s;
      overflow-y: auto;
    }

    .wrap {
      padding: 0 0px 0px 0px;
      display: flex;
      flex-direction: column;
      --title-h: 34px;
      height: 550px;
      min-height: 550px;
    }

    /* 窗口顶部可拖拽条：高度 = 标题高度，横跨整个窗口宽度，并在其中显示当前面板标题作为视觉标识 */
    .window-drag-bar {
      height: var(--title-h);
      flex: 0 0 var(--title-h);
      display: flex;
      align-items: center;
      cursor: default;
    }

    .window-drag-bar::before {
      content: '';
      flex: 0 0 96px;
      /* 避让左侧边栏（tabs 132px + gap 16px ≈ 148px） */
    }

    .window-drag-bar .drag-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      user-select: none;
      pointer-events: none;
      flex: 1;
      text-align: center;
      /* 让整条都可拖拽，不被文字拦截 */
    }

    /* 拖拽条下方的内容行：左侧 tab 栏 + 右侧面板 */
    .content-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      /* gap: 16px; */
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
    }

    /* 左侧竖向标签分页（整列作为侧边栏，与内容区左右分栏） */
    .tabs {
      display: flex;
      flex-direction: column;
      flex: 0 0 103px;
      gap: 4px;
      margin-bottom: 0;
      position: sticky;
      top: 0;
      padding-top: 0;
      /* background: var(--sidebar-bg); */
      /* background: radial-gradient(ellipse var(--sidebar-bg), #fff, ); */
      background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
      background: radial-gradient(circle at center,
          /* 圆心位置：center 也可写 50% 50% */
          var(--sidebar-bg)30%,
          /* 圆心颜色 */
          var(--sidebar-bg) 5%,
          /* 40%半径处过渡 */
          var(--bg) 100%
          /* 边缘颜色 */
        );
      padding: 0 10px;
    }

    /* 面板标题已移至顶部拖拽条（#window-title），此处不再单独渲染 */

    .tab {
      flex: none;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      padding: 9px 0px 9px 9px;
      background: transparent;
      /* 与侧边栏背景融为一体，不再有卡片感 */
      border: none;
      /* 去掉卡片边框 / tab 之间的分割线 */
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      transition: background .15s, color .15s;
    }

    .tab:hover {
      color: var(--text);
      background: var(--surface-2);
    }

    .tab.active {
      background: var(--active-tab);
      color: #fff;
    }

    /* 实验室开关控制：隐藏的 tab 入口不占布局 */
    .tab[hidden] {
      display: none !important;
    }

    .tab svg {
      width: 14px;
      height: 14px;
    }

    .tab .icon-line {
      display: none;
    }

    .tab .icon-filled {
      display: block;
      padding: 2px;
      border-radius: 5px;
      width: 22px;
      height: 22px;
    }

    .tab[data-tab="general"] .icon-filled {
      color: #fff;
      background: var(--tab-general);
    }

    .tab[data-tab="ann"] .icon-filled {
      color: #fff;
      background: var(--tab-ann);
    }

    .tab[data-tab="tidy"] .icon-filled {
      color: #fff;
      background: var(--tab-tidy);
    }

    .tab[data-tab="about"] .icon-filled {
      color: #fff;
      background: var(--tab-about);
    }

    .tab[data-tab="translate"] .icon-filled {
      color: #fff;
      background: var(--tab-translate);
    }

    .tab[data-tab="focus"] .icon-filled {
      color: #fff;
      background: var(--tab-focus);
    }

    .tab[data-tab="keepawake"] .icon-filled {
      color: #fff;
      background: #b07a4a;
    }

    .tab-panel {
      padding: 15px;
      display: none;
    }

    .tab-panel.active {
      display: block;
      flex: 1;
      min-width: 0;
    }

    /* 标签页内首个分组标题与标签栏间距收紧 */
    .tab-panel .section-title:first-child {
      margin-top: 0;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      border: #34c759;
      letter-spacing: .5px;
      margin: 4px 2px 8px;
    }

    .section-title:not(:first-child) {
      margin-top: 18px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      gap: 12px;
    }

    .row .label {
      font-weight: 500;
      white-space: nowrap;
    }

    select {
      -webkit-appearance: none;
      appearance: none;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 26px 5px 10px;
      font-size: 13px;
      cursor: pointer;
      max-width: 180px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 9px center;
    }

    /* toggle switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border-strong);
      border-radius: 22px;
      transition: background .2s;
      cursor: pointer;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .2);
      transition: transform .2s;
    }

    .switch input:checked+.slider {
      background: var(--accent);
    }

    .switch input:checked+.slider::before {
      transform: translateX(18px);
    }

    input.num {
      width: 64px;
      text-align: right;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 13px;
    }

    .kbd {
      min-width: 76px;
      height: 30px;
      text-align: center;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 0 10px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
    }

    .kbd.recording {
      border-color: var(--accent);
      color: var(--accent);
    }

    .kbd.warn {
      border-color: #f56c6c;
      color: #f56c6c;
    }

    .mini-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .perm .label {
      color: var(--text-sub);
      font-size: 12px;
      white-space: normal;
    }

    #tidy-detail.disabled {
      opacity: .45;
      pointer-events: none;
    }

    #keepawake-detail.disabled {
      opacity: .45;
      pointer-events: none;
    }

    /* 主题：图标分段选择 */
    .seg {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 3px;
      height: 30px;
      box-sizing: border-box;
    }

    .seg-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--text-sub);
      border-radius: 7px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .seg-btn:hover {
      color: var(--text);
    }

    .seg-btn.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .14);
    }

    .seg-btn svg {
      width: 16px;
      height: 16px;
    }

    /* 分组卡片：同一分区的若干设置合成一张卡，行间用细分隔线 */
    .group {
      background: var(--surface);
      /* border: 1px solid var(--border); */
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .grow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0px;
    }

    .grow+.grow {
      border-top: 1px solid var(--border);
    }

    .grow.col {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }

    .grow .label {
      font-weight: 500;
      white-space: nowrap;
    }

    /* 语言下拉选择 */
    #language-select {
      padding: 0 8px;
      height: 30px;
      width: 120px;
      /* 与「主题」分段按钮（.seg）等宽，视觉对齐 */
      border-radius: 8px;
      border: 1px solid var(--border-strong);
      background: var(--surface-2);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      outline: none;
      appearance: auto;
    }

    #language-select:focus {
      border-color: var(--accent);
    }

    /* 码放快捷键：方向键十字布局 */
    .tidy-cross {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 10px;
      margin-top: 12px;
    }

    .cross-cell {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .cross-cell .kbd {
      width: auto;
      min-width: 50px;
      /* 原 76px，约缩小 1/3 */
      padding: 5px 8px;
    }

    .cross-label {
      font-size: 12px;
      color: var(--text-sub);
      white-space: nowrap;
    }

    .c-max {
      grid-column: 2;
      grid-row: 1;
    }

    .c-left {
      grid-column: 1;
      grid-row: 2;
    }

    .c-right {
      grid-column: 3;
      grid-row: 2;
    }

    .c-restore {
      grid-column: 2;
      grid-row: 3;
    }

    /* 重要日期倒计时 */
    .ann-input {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 5px 10px;
      height: 30px;
      box-sizing: border-box;
      font-size: 13px;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
    }

    .ann-input:focus {
      border-color: var(--accent);
    }

    .ann-del-btn:hover {
      background: #fde0e0 !important;
    }

    input[type="date"].ann-input {
      color-scheme: light dark;
    }

    /* 自定义日期选择器（替代原生 date，便于快速跳年份） */
    .ann-date-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .ann-date-trigger {
      font-family: inherit;
      width: 152px;
      padding: 0 10px;
      transition: border-color .15s;
      -webkit-user-select: none;
      user-select: none;
    }

    .ann-date-trigger:hover {
      border-color: var(--accent);
    }

    .ann-date-trigger:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    .ann-date-pop {
      position: fixed;
      z-index: 9999;
      width: 172px;
      padding: 8px;
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .18);
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden;
    }

    .ann-date-pop.hidden {
      display: none !important;
    }

    .ann-dp-head {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .ann-dp-navrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ann-dp-nav {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border: none;
      background: transparent;
      color: var(--text-sub);
      border-radius: 6px;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
    }

    .ann-dp-nav:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .ann-dp-selects {
      display: flex;
      gap: 4px;
      width: 100%;
    }

    .ann-dp-selects select {
      flex: 1;
      min-width: 0;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      padding: 3px 4px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }

    .ann-dp-selects select:focus {
      border-color: var(--accent);
    }

    .ann-dp-weekdays,
    .ann-dp-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
    }

    .ann-dp-weekdays {
      margin-bottom: 4px;
    }

    .ann-dp-weekdays div {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text-sub);
      padding: 2px 0;
    }

    .ann-dp-cell {
      /* aspect-ratio: 1 / 1; */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      border: none;
      background: transparent;
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }

    .ann-dp-cell:hover {
      background: var(--surface-2);
    }

    .ann-dp-cell.muted {
      visibility: hidden;
      cursor: default;
    }

    .ann-dp-cell.today {
      color: var(--accent);
      font-weight: 600;
    }

    .ann-dp-cell.selected {
      background: var(--accent);
      color: #fff;
    }

    .ann-dp-cell.selected:hover {
      background: var(--accent);
    }

    .ann-dp-foot {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .ann-dp-foot button {
      flex: 1;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 12px;
      padding: 5px 0;
      cursor: pointer;
      font-family: inherit;
    }

    .ann-dp-foot button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    @keyframes ann-shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-4px);
      }

      40% {
        transform: translateX(4px);
      }

      60% {
        transform: translateX(-3px);
      }

      80% {
        transform: translateX(3px);
      }
    }

    .ann-shake {
      animation: ann-shake 0.35s ease;
      border-color: #f56c6c !important;
    }

    /* 关于 */
    .about-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .about-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .2px;
    }

    .about-version {
      font-size: 12px;
      color: var(--text-sub);
    }

    .about-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-left: auto;
    }

    .about-link:hover {
      text-decoration: underline;
    }

    /* ============================================================
       翻译面板样式
       ============================================================ */
    .tr-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 100%;
    }

    .tr-card {
      position: relative;
      display: flex;
      flex: 1;
      min-height: 380px;
      background: var(--surface);
      border-radius: 14px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .04), 0 10px 28px rgba(0, 0, 0, .06);
      overflow: hidden;
    }

    .tr-col {
      position: relative;
      flex: 1 1 0;
      display: flex;
      min-width: 0;
      min-height: 0;
    }

    .tr-divider {
      flex: 0 0 1px;
      align-self: stretch;
      background: var(--border-strong);
    }

    textarea.tr-source,
    textarea.tr-result {
      -webkit-user-select: text;
      user-select: text;
      flex: 1;
      min-height: 0;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      padding: 52px 16px 16px;
      font-size: 14px;
      line-height: 1.62;
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      transition: border-color .15s;
    }

    textarea.tr-source:focus,
    textarea.tr-result:focus {
      outline: none;
    }

    textarea.tr-result {
      cursor: text;
    }

    textarea:disabled {
      opacity: 0.7;
    }

    /* floating copy button (top-right of result column) */
    .tr-copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 4;
      border: none;
      background: var(--surface-2);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      padding: 5px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .12s, color .12s, box-shadow .12s;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .08);
    }

    .tr-copy-btn:hover:not(:disabled) {
      background: var(--surface-3);
    }

    .tr-copy-btn:disabled {
      color: var(--text-sub);
      background: transparent;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* translate FAB on the divider, top */
    .tr-fab {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
    }

    .tr-card .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--tr-accent-2));
      border-color: transparent;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 3px 12px rgba(64, 158, 255, .35);
    }

    .tr-card .btn.primary:hover:not(:disabled) {
      filter: brightness(1.06);
      box-shadow: 0 5px 18px rgba(64, 158, 255, .45);
    }

    .tr-hidden {
      display: none !important;
    }

    .tr-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tr-actions .spacer {
      flex: 1;
    }

    /* 翻译主按钮渐变（仅作用于翻译面板，不影响其他面板） */
    .tr-actions .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--tr-accent-2));
      border-color: transparent;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 3px 12px rgba(64, 158, 255, .35);
    }

    .tr-actions .btn.primary:hover:not(:disabled) {
      filter: brightness(1.06);
      box-shadow: 0 5px 18px rgba(64, 158, 255, .45);
    }

    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background .12s, border-color .12s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--surface-2);
    }

    .btn:active {
      background: var(--surface-3);
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn.primary svg {
      width: 15px;
      height: 15px;
      display: block;
    }

    .btn.primary:hover {
      filter: brightness(1.08);
    }

    .btn.primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn:disabled {
      cursor: not-allowed;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--surface-2);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width .3s;
    }

    .progress-fill.animated {
      width: 30% !important;
      animation: loading-pulse 1.4s ease-in-out infinite;
    }

    @keyframes loading-pulse {
      0% {
        margin-left: 0%;
        width: 20%;
      }

      50% {
        margin-left: 50%;
        width: 30%;
      }

      100% {
        margin-left: 80%;
        width: 20%;
      }
    }

    .progress-text {
      font-size: 11px;
      color: var(--text-sub);
      text-align: center;
    }

    .tr-status-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-sub);
    }

    /* 翻译页隐藏目标语言提示、模型状态与字符计数（标题已移至拖拽条） */
    .tab-panel[data-panel="translate"] .lang-row,
    .tab-panel[data-panel="translate"] .tr-status-row {
      display: none;
    }

    .hidden {
      display: none !important;
    }

    .loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .model-status-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .model-status-tag.downloaded {
      background: rgba(52, 199, 89, 0.12);
      color: #34c759;
    }

    .model-status-tag.loaded {
      background: rgba(7, 193, 96, 0.12);
      color: var(--accent);
    }

    .model-status-tag.none {
      background: var(--surface-2);
      color: var(--text-sub);
    }

    /* ============================================================
       轻听面板样式
       ============================================================ */
    .fm-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .fm-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fm-header-icon {
      font-size: 18px;
      line-height: 1;
    }

    .fm-header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .fm-header-sub {
      font-size: 11px;
      color: var(--text-sub);
    }

    .fm-transport {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .play-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: transform .12s, filter .12s;
      flex-shrink: 0;
    }

    .play-btn:hover {
      filter: brightness(1.1);
    }

    .play-btn:active {
      transform: scale(0.95);
    }

    .play-btn.playing {
      background: var(--text-sub);
    }

    .now-playing {
      font-size: 12px;
      color: var(--text-sub);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }

    .now-playing strong {
      color: var(--text);
    }

    .fm-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: -4px;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .preset-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      transition: background .12s, border-color .12s, box-shadow .12s;
    }

    .preset-card:hover {
      background: var(--surface-2);
      border-color: var(--border-strong);
    }

    .preset-card.active {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, var(--surface));
      box-shadow: 0 0 0 1px var(--accent);
    }

    .preset-card .preset-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .preset-card .preset-desc {
      font-size: 10px;
      color: var(--text-sub);
      line-height: 1.35;
    }

    .prompt-row {
      display: flex;
      gap: 6px;
    }

    .prompt-input {
      flex: 1;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      -webkit-user-select: text;
      user-select: text;
    }

    .prompt-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .prompt-input::placeholder {
      color: var(--text-sub);
    }

    .fm-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: var(--text-sub);
    }

    .toggle-row input {
      display: none;
    }

    .toggle-track {
      width: 32px;
      height: 18px;
      border-radius: 9px;
      background: var(--border-strong);
      position: relative;
      transition: background .15s;
    }

    .toggle-track.on {
      background: var(--accent);
    }

    .toggle-knob {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: left .15s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
    }

    .toggle-track.on .toggle-knob {
      left: 16px;
    }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .volume-icon {
      font-size: 14px;
      color: var(--text-sub);
      flex-shrink: 0;
    }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--border-strong);
      outline: none;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* 防休眠：时长滑块刻度 */
    .keepawake-ticks {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-sub);
      margin-top: 2px;
      user-select: none;
    }

    .keepawake-ticks span {
      flex: 1;
      text-align: center;
      cursor: pointer;
      padding: 2px 0;
      border-radius: 4px;
    }

    .keepawake-ticks span.active {
      color: var(--accent);
      font-weight: 700;
    }

    .keepawake-ticks span:hover {
      background: var(--surface-2);
    }

    .keepawake-note {
      font-size: 11px;
      color: var(--text-sub);
      line-height: 1.5;
      margin: 10px 2px 0;
    }

    .keepawake-countdown {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 8px;
    }

    .keepawake-countdown #keepawake-remain {
      font-weight: 600;
      color: var(--accent);
    }

    .link-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 12px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .link-btn:hover {
      background: var(--surface-2);
    }

    .fm-status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-sub);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border-strong);
      flex-shrink: 0;
    }

    .status-dot.ready {
      background: #34c759;
    }

    .status-dot.playing {
      background: var(--accent);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-dot.error {
      background: #ff3b30;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .setup-banner {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      font-size: 12px;
    }

    .setup-banner p {
      margin: 0 0 10px;
      color: var(--text-sub);
    }
  </style>
</head>

          </div>
        </div>

        <!-- <div class="section-title" data-i18n="appearance">外观</div> -->
        <!-- <div class="group">
        
        </div> -->

        <!-- <div class="section-title" data-i18n="lab">实验室</div> -->
        <div class="group">
          <div class="grow">
            <span class="label" data-i18n="lab_focus_tab">显示轻听标签</span>
            <label class="switch">
              <input type="checkbox" id="lab-focus-tab">
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div class="group">
          <div class="grow">
            <span class="label">关于日行</span>
            <button class="about-link" id="about-github" data-i18n="about_github">GitHub 主页</button>
          </div>
        </div>

      </div>

      <div class="tab-panel" data-panel="ann" data-title-key="ann_section">
        <div id="ann-list"></div>
        <div class="row" style="flex-direction:column;align-items:stretch;gap:8px">
          <div style="display:flex;gap:6px;align-items:center">
            <input id="ann-name" type="text" class="ann-input" style="flex:1;min-width:0"
              data-i18n-placeholder="ann_name_placeholder" placeholder="如：妈妈生日">
            <div class="ann-date-wrap">
              <button type="button" id="ann-date-btn" class="ann-input ann-date-trigger is-empty"
                style="flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:6px;cursor:pointer;width:152px;font-family:inherit">
                <span id="ann-date-text" data-i18n="ann_date_placeholder"
                  style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-sub)">MM-DD 或
                  YYYY-MM-DD</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:.55">
                  <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
              </button>
              <input type="hidden" id="ann-date" value="">
              <div id="ann-date-pop" class="ann-date-pop hidden"></div>
            </div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="label" style="font-size:12px" data-i18n="ann_repeat">每年重复</span>
              <label class="switch">
                <input type="checkbox" id="ann-repeat" checked>
                <span class="slider"></span>
              </label>
            </div>
            <button class="mini-btn" id="ann-add-btn" data-i18n="ann_add">+ 添加</button>
          </div>
        </div>
      </div>

      <div class="tab-panel" data-panel="tidy" data-title-key="tidy">
        <div class="row">
          <span class="label" data-i18n="tidy_enable">启用窗口整理</span>
          <label class="switch">
            <input type="checkbox" id="tidy-enabled">
            <span class="slider"></span>
          </label>
        </div>
        <div id="tidy-detail">
          <div class="row perm" id="tidy-perm-row" style="display:none">
            <span class="label" data-i18n="tidy_perm">需开启「辅助功能」权限</span>
            <button class="mini-btn" id="tidy-grant" data-i18n="tidy_grant">去授权</button>
          </div>
          <div class="row">
            <span class="label" data-i18n="tidy_gap">窗口边距 (px)</span>
            <input type="number" id="tidy-gap" class="num" min="0" max="80" step="1">
          </div>
          <!-- 快捷键按方向键十字摆放：上=最大化 / 左=左半屏 / 右=右半屏 / 下=复原 -->
          <div class="tidy-cross">
            <div class="cross-cell c-max">
              <span class="cross-label" data-i18n="tidy_max">最大化</span>
              <button class="kbd" data-key="max"></button>
            </div>
            <div class="cross-cell c-left">
              <span class="cross-label" data-i18n="tidy_left">左半屏</span>
              <button class="kbd" data-key="left"></button>
            </div>
            <div class="cross-cell c-right">
              <span class="cross-label" data-i18n="tidy_right">右半屏</span>
              <button class="kbd" data-key="right"></button>
            </div>
            <div class="cross-cell c-restore">
              <span class="cross-label" data-i18n="tidy_restore">复原</span>
              <button class="kbd" data-key="restore"></button>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-panel" data-panel="keepawake" data-title-key="keepawake">
        <div class="row">
          <div class="label" style="display:flex;flex-direction:column;gap:2px">
            <span data-i18n="keepawake_enable">启用防休眠</span>
            <span style="font-size:11px;color:var(--text-sub)" data-i18n="keepawake_enable_hint">开启后电脑不会进入休眠</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="keepawake-enabled">
            <span class="slider"></span>
          </label>
        </div>
        <div id="keepawake-detail">
          <div class="group">
            <div class="grow col">
              <div style="display:flex;align-items:center;justify-content:space-between">
                <span class="label" data-i18n="keepawake_duration_label">防休眠生效时长</span>
                <span id="keepawake-value" style="font-weight:600;color:var(--accent)">1 小时</span>
              </div>
              <input type="range" class="volume-slider" id="keepawake-duration" min="0" max="9" step="1" value="2">
              <div class="keepawake-ticks" id="keepawake-ticks"></div>
              <div class="keepawake-countdown" id="keepawake-countdown" style="display:none">
                <span id="keepawake-remain">剩余 --</span>
                <button type="button" class="link-btn" id="keepawake-cancel">取消</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-panel" data-panel="translate" data-title-key="tab_translate">
        <div class="tr-wrap">
          <div class="tr-card">
            <div class="tr-col src">
              <textarea class="tr-source" id="source-text" data-i18n-placeholder="translate_placeholder"
                placeholder="输入..."></textarea>
            </div>

            <div class="tr-divider"></div>

            <div class="tr-col tgt">
              <button class="tr-copy-btn" id="copy-btn" data-i18n="translate_copy" disabled>复制结果</button>
              <textarea class="tr-result" id="result-text" readonly data-i18n-placeholder="translate_result_placeholder"
                placeholder="结果..."></textarea>
            </div>

            <button class="btn primary tr-fab" id="translate-btn">
              <span class="tr-btn-icon"></span>
              <span class="tr-btn-text" data-i18n="translate_btn">翻译</span>
            </button>

            <!-- 隐藏元素：JS 仍需引用，仅不显示 -->
            <span id="tgt-lang-label" class="tr-hidden">English</span>
            <span id="char-count" class="tr-hidden">0 / 30000</span>
          </div>

          <div class="tr-actions">
            <button class="btn primary" id="translate-btn-legacy" style="display:none" aria-hidden="true">
              <span class="tr-btn-icon"></span>
              <span class="tr-btn-text" data-i18n="translate_btn">翻译</span>
            </button>
            <div id="loading-indicator" class="loading-spinner hidden"></div>
          </div>

          <div id="progress-section" class="hidden">
            <div class="progress-bar">
              <div class="progress-fill animated" id="progress-fill" style="width:0%"></div>
            </div>
            <div class="progress-text" id="progress-text">0%</div>
          </div>

          <div class="tr-status-row" style="display:none;">
            <span id="model-status" data-i18n="translate_no_model">
              <span class="model-status-tag none">模型未加载</span>
            </span>
          </div>
        </div>
      </div>

      <div class="tab-panel" data-panel="focus" data-title-key="tab_focus">
        <div class="fm-wrap">
          <div class="fm-header">
            <span class="fm-header-icon">🎵</span>
            <span class="fm-header-title" data-i18n="focus_title">轻听</span>
            <span class="fm-header-sub" data-i18n="focus_subtitle">AI 实时生成</span>
            <span style="flex:1"></span>
          </div>

          <div class="fm-transport">
            <button class="play-btn" id="play-btn" title="播放 / 暂停">▶</button>
            <span class="now-playing" id="now-playing">
              <span data-i18n="focus_ready">就绪</span>
            </span>
          </div>

          <div class="setup-banner" id="setup-banner">
            <p data-i18n="focus_setup_desc">需要 Python 环境和 MRT2 模型才能使用。首次使用请先安装依赖。</p>
            <button class="btn primary" id="setup-btn" data-i18n="focus_check_setup">检查并启动</button>
            <button class="btn" id="open-docs-btn" style="margin-left:6px;" data-i18n="focus_setup_guide">安装指南</button>
          </div>

          <div id="main-ui" class="hidden" style="display:flex;flex-direction:column;gap:12px;">
            <span class="fm-section-label" data-i18n="focus_vibe">场景氛围</span>
            <div class="preset-grid" id="preset-vibe"></div>

            <span class="fm-section-label" data-i18n="focus_genre">音乐风格</span>
            <div class="preset-grid" id="preset-genre"></div>

            <span class="fm-section-label" data-i18n="focus_instrument">乐器主导</span>
            <div class="preset-grid" id="preset-instrument"></div>

            <span class="fm-section-label" data-i18n="focus_custom">自定义提示词</span>
            <div class="prompt-row">
              <input class="prompt-input" id="custom-prompt" data-i18n-placeholder="focus_custom_placeholder"
                placeholder="描述你想要的音乐...">
              <button class="btn primary" id="apply-prompt-btn" data-i18n="focus_apply">应用</button>
            </div>

            <div class="fm-controls">
              <label class="toggle-row" id="drums-toggle">
                <input type="checkbox" id="drums-check" checked>
                <span class="toggle-track on" id="drums-track">
                  <span class="toggle-knob"></span>
                </span>
                <span data-i18n="focus_drums">鼓点 / 节奏</span>
              </label>
              <span style="flex:1"></span>
            </div>

            <div class="volume-row">
              <span class="volume-icon">🔊</span>
              <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="80">
            </div>
          </div>

          <div class="fm-status-row" id="fm-status-row">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text" data-i18n="focus_status_init">未启动</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="ui-common.js"></script>
  <script src="settings.js"></script>
</body>

</html>
