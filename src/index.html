<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>TODO List</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="arrow-up"></div>

  <!-- 全局 Loading 遮罩 -->
  <div id="global-loading" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div class="todo-container" id="main-container">
    <!-- 标题栏：左侧 Todos（带排序下拉+待办总数），右侧成就按钮 -->
    <div class="app-header">
      <div class="header-left">
        <div class="title-wrap">
          <button id="title-sort-btn" class="app-title custom-tooltip" data-i18n-title="sort" data-tooltip="排序">
            <span data-i18n="app_title">Todos</span> <span id="pending-count" class="title-count">0</span>
            <span class="title-caret"></span>
          </button>
          <div id="sort-dropdown" class="dropdown-menu hidden">
            <div class="dropdown-item" data-sort="default" data-i18n="sort_category">按分类</div>
            <div class="dropdown-item" data-sort="priority" data-i18n="sort_priority">按优先级</div>
            <div class="dropdown-item" data-sort="time" data-i18n="sort_time">按时间</div>
          </div>
        </div>
      </div>
      <div class="header-right">
        <button id="countdown-btn" class="achievement-btn custom-tooltip" data-i18n-title="countdown" data-tooltip="倒计时">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </button>
        <button id="view-completed-btn" class="achievement-btn custom-tooltip" data-i18n-title="tip_achievement" data-tooltip="成就">
          <span class="achievement-icon"><svg width="14" height="14" viewBox="0 0 1024 1024" fill="currentColor">
              <path
                d="M95.880533 68.266667a17.066667 17.066667 0 0 0-15.2576 24.712533l119.466667 238.933333a17.066667 17.066667 0 0 0 15.2576 9.4208h234.9056a17.066667 17.066667 0 0 0 15.2576-24.712533l-119.466667-238.933333A17.066667 17.066667 0 0 0 330.786133 68.266667H95.880533z m832.238934 0a17.066667 17.066667 0 0 1 15.2576 24.712533l-119.466667 238.933333a17.066667 17.066667 0 0 1-15.2576 9.4208h-234.9056a17.066667 17.066667 0 0 1-15.2576-24.712533l119.466667-238.933333A17.066667 17.066667 0 0 1 693.213867 68.266667h234.9056z"
                fill="#FFAA44" />
              <path
                d="M921.6 580.266667c0 226.2016-183.3984 409.6-409.6 409.6S102.4 806.468267 102.4 580.266667 285.7984 170.666667 512 170.666667s409.6 183.3984 409.6 409.6z"
                fill="#11AA66" />
              <path
                d="M512 324.266667a256 256 0 1 0 0 512 256 256 0 0 0 0-512zM221.866667 580.266667a290.133333 290.133333 0 1 1 580.266666 0 290.133333 290.133333 0 0 1-580.266666 0z"
                fill="#fff" />
              <path
                d="M648.533333 580.266667a136.533333 136.533333 0 1 1-273.066666 0 136.533333 136.533333 0 0 1 273.066666 0z"
                fill="#fff" />
            </svg></span>
          <span id="completed-count">0</span>
        </button>
      </div>
    </div>

    <div class="todo-list" id="todo-list">
      <!-- Generated by JS -->
    </div>

    <!-- <div class="divider" style="margin-top: 12px; margin-bottom: 12px;"></div> -->

    <!-- 底部区域已被移除，排序按钮移动到了顶部 -->
  </div>

  <!-- 倒计时模态框（与番茄钟共用胶囊窗口模式） -->
  <div id="countdown-modal" class="modal hidden">
    <div class="modal-content" data-tauri-drag-region
      style="padding: 10px 16px; display: flex; flex-direction: row; align-items: center; gap: 10px; height: 100%;">
      <span data-tauri-drag-region data-i18n="countdown"
        style="font-size: 12px; font-weight: 600; color: #909399; white-space: nowrap; flex-shrink: 0;">倒计时</span>

      <div id="countdown-display" data-tauri-drag-region
        style="flex: 1; font-size: 16px; font-weight: 800; color: #409eff; font-variant-numeric: tabular-nums; text-align: center; cursor: pointer; user-select: none;">
        25:00</div>
      <input id="countdown-input" type="text"
        style="display: none; flex: 1; font-size: 16px; font-weight: 800; color: #409eff; border: none; background: transparent; text-align: center; font-variant-numeric: tabular-nums; outline: none; border-bottom: 1.5px solid #409eff; min-width: 60px; max-width: 80px;" />

      <div style="display: flex; gap: 6px; flex-shrink: 0;">
        <button id="countdown-toggle-btn" class="nav-btn icon-only"
          style="background: #fdf6ec; color: #e6a23c; border-radius: 50%; border: none; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;">
          <svg id="countdown-play-icon" width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          <svg id="countdown-pause-icon" class="hidden" width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
        </button>
        <button id="countdown-reset-btn"
          style="background: #f4f4f5; color: #909399; border-radius: 50%; border: none; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 .49-4.95"></path>
          </svg>
        </button>
        <button id="countdown-exit-btn" class="close-btn"
          style="width: 26px; height: 26px; font-size: 14px; background: #f4f4f5; color: #909399; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer;">
          ×
        </button>
      </div>
    </div>
  </div>

  <!-- 番茄钟 / 专注模式容器 (作为 Modal 弹窗在原窗口内覆盖) -->
  <div id="pomodoro-modal" class="modal hidden">
    <div class="modal-content" data-tauri-drag-region
      style="padding: 16px; display: flex; flex-direction: row; align-items: center; gap: 12px; height: 100%;">
      <!-- 任务标题（单行粗体，超长省略） -->
      <div id="pomodoro-task-title" data-tauri-drag-region
        style="flex: 1; font-size: 16px; font-weight: 800; color: #2c3e50; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left;">
        当前任务</div>

      <!-- 倒计时与控制按钮区域 -->
      <div style="display: flex; align-items: center; gap: 12px;">
        <div id="pomodoro-timer"
          style="font-size: 16px; font-weight: 800; color: #409eff; font-variant-numeric: tabular-nums;">
          25:00</div>

        <div style="display: flex; gap: 8px;">
          <!-- 播放/暂停控制按钮 -->
          <button id="pomodoro-toggle-btn" class="nav-btn icon-only"
            style="background: #fdf6ec; color: #e6a23c; border-radius: 50%; padding: 6px; border: none; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;">
            <!-- 播放图标 -->
            <svg id="pomodoro-play-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <!-- 暂停图标 -->
            <svg id="pomodoro-pause-icon" class="hidden" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          </button>

          <!-- 关闭按钮 -->
          <button id="pomodoro-exit-btn" class="close-btn"
            style="width: 26px; height: 26px; font-size: 14px; background: #f4f4f5; color: #909399; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            ×
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Completed Modal -->
  <div id="completed-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 data-i18n="achievement">成就</h3>
        <button id="close-modal-btn" class="close-btn">×</button>
      </div>
      <div class="modal-body">
        <!-- 仪表盘内容 -->
        <div id="dashboard-content" style="display: block; margin-bottom: 20px;">
          <div class="dashboard-row" style="margin-top: 0;">
            <div class="chart-wrapper" style="flex: 1;">
              <canvas id="trend-chart"></canvas>
            </div>
          </div>
        </div>
        <div id="completed-list"></div>
      </div>
    </div>
  </div>

  <!-- Toast 通知容器 -->
  <div id="toast-container" class="toast-container hidden">
    <span id="toast-message"></span>
    <button id="toast-undo-btn" class="toast-undo-btn" data-i18n="undo">撤销</button>
  </div>

  <script src="vendor/chart.umd.min.js"></script>
  <script src="i18n.js"></script>
  <script src="ui-common.js"></script>
  <script src="renderer.js"></script>
</body>

</html>
